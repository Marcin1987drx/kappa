<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    -webkit-app-region: drag;
    user-select: none;
  }
  .logo {
    width: 100px;
    height: 100px;
    background: linear-gradient(135deg, #111 0%, #1a1a2e 100%);
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 60px rgba(6,182,212,0.08);
    border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 28px;
    animation: logoFloat 2s ease-in-out infinite;
  }
  .logo-text {
    font-size: 38px;
    font-weight: 800;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #06b6d4, #22d3ee, #67e8f9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  @keyframes logoFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .title {
    font-size: 22px;
    font-weight: 600;
    color: #f1f5f9;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 12px;
    color: rgba(148,163,184,0.7);
    letter-spacing: 0.5px;
    margin-bottom: 36px;
  }
  .loader-track {
    width: 200px;
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .loader-bar {
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, transparent, #06b6d4, #22d3ee, transparent);
    border-radius: 3px;
    animation: loaderSlide 1.4s ease-in-out infinite;
  }
  @keyframes loaderSlide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
  .status {
    font-size: 11px;
    color: rgba(148,163,184,0.5);
    letter-spacing: 0.3px;
  }
  .dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }
</style>
</head>
<body>
  <div class="logo"><span class="logo-text">PA</span></div>
  <div class="title">Kappa Plannung</div>
  <div class="subtitle">DRÄXLMAIER Planning Application</div>
  <div class="loader-track"><div class="loader-bar"></div></div>
  <div class="status">Initialisierung<span class="dots"></span></div>
</body>
</html>
